<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePrep Ultimate - Elite Coding Environment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --editor-bg: #0b0e14;
            --sidebar-bg: #ffffff;
            --accent: #3b82f6;
            --terminal-bg: #000000;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--editor-bg);
            color: #f3f4f6;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
        }
        
        .view { 
            display: none; 
            height: calc(100vh - 64px); 
            flex-direction: column; 
            overflow: hidden;
        }
        .view.active { display: flex; }

        /* Resizable Workspace */
        .workspace {
            display: flex;
            height: 100%;
            overflow: hidden;
            background: #111827;
            position: relative;
        }

        .problem-sidebar {
            background: var(--sidebar-bg);
            color: #1e293b;
            overflow-y: auto;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            min-width: 250px;
            max-width: 700px;
            width: 400px; /* Initial Width */
        }

        /* Horizontal Resizer */
        .resizer-h {
            width: 6px;
            cursor: col-resize;
            background: #1f2937;
            transition: background 0.2s;
            z-index: 20;
        }
        .resizer-h:hover, .resizer-h.is-dragging {
            background: var(--accent);
        }

        /* Vertical Resizer for Bottom Drawer */
        .resizer-v {
            height: 4px;
            cursor: row-resize;
            background: #1f2937;
            transition: background 0.2s;
            z-index: 30;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .resizer-v:hover, .resizer-v.is-dragging {
            background: var(--accent);
        }

        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--editor-bg);
            position: relative;
            overflow: hidden;
            min-width: 300px;
        }

        .custom-textarea {
            width: 100%;
            flex-grow: 1;
            background: var(--editor-bg);
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            padding: 24px;
            border: none;
            outline: none;
            resize: none;
            line-height: 1.6;
            caret-color: #3b82f6;
            tab-size: 4;
            white-space: pre;
            overflow: auto;
        }

        /* Bottom Drawer with Tabs */
        .bottom-drawer {
            height: 35%; 
            min-height: 100px;
            max-height: 85%;
            background: var(--terminal-bg);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: relative;
            padding-top: 4px; /* Space for the vertical resizer handle */
        }

        .tab-btn {
            padding: 0 1.5rem;
            height: 100%;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            border-right: 1px solid #1f2937;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: white;
            background: #1f2937;
        }

        .terminal-content {
            flex-grow: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            overflow-y: auto;
            color: #10b981; 
            background: #000000;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        #html-preview-pane {
            display: none;
            flex-grow: 1;
            background: white;
        }
        #html-preview-pane.active { display: block; }

        .btn-run {
            background: #1f2937;
            color: #ffffff;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            transition: all 0.2s;
            border: 1px solid #374151;
        }
        .btn-run:hover { background: #374151; border-color: #3b82f6; }

        .btn-submit {
            background: var(--accent);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 800;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .btn-submit:hover {
            background: #2563eb;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-16 bg-[#030712] border-b border-[#1f2937] flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.href=location.pathname">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
            </div>
            <span class="font-extrabold text-white tracking-tighter text-lg uppercase">CodePrep</span>
        </div>
        <div id="header-status" class="hidden flex items-center gap-6">
            <div class="flex items-center gap-2 px-3 py-1 bg-blue-900/30 rounded-full border border-blue-800/50">
                <div class="w-2 h-2 rounded-full bg-blue-400 animate-pulse"></div>
                <span id="nav-timer" class="font-mono text-blue-300 font-bold text-sm">00:00</span>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-grow overflow-hidden">
        
        <!-- View: Landing -->
        <div id="view-landing" class="view active items-center justify-center bg-[#030712]">
            <div class="max-w-4xl w-full px-6 text-center animate-enter">
                <h1 class="text-6xl font-black text-white mb-6 tracking-tight">Level up your <span class="text-blue-500">hiring.</span></h1>
                <p class="text-slate-400 text-xl mb-12 max-w-xl mx-auto">Build, deploy, and grade technical assessments in seconds.</p>
                <div class="grid grid-cols-2 gap-6">
                    <button onclick="showView('create')" class="p-8 bg-white rounded-3xl text-left group hover:bg-blue-50 transition-all">
                        <p class="text-[10px] font-black text-blue-600 uppercase mb-2">Recruiters</p>
                        <h3 class="text-2xl font-bold text-slate-900">Create Contest</h3>
                    </button>
                    <div class="p-8 bg-[#111827] rounded-3xl text-left border border-[#1f2937]">
                        <p class="text-[10px] font-black text-emerald-500 uppercase mb-2">Candidates</p>
                        <div class="flex gap-2">
                            <input id="join-input" type="text" placeholder="Paste String..." class="flex-grow bg-[#030712] border border-[#1f2937] rounded-xl px-4 py-2 text-sm text-white font-mono outline-none focus:ring-1 ring-blue-500">
                            <button onclick="handleManualJoin()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold text-white">JOIN</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- View: Designer -->
        <div id="view-create" class="view bg-[#f1f5f9] p-8 overflow-hidden">
            <div class="max-w-4xl mx-auto w-full h-full flex flex-col">
                <div class="flex justify-between items-center mb-6 shrink-0">
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Studio</h2>
                    <button onclick="showView('landing')" class="text-slate-400 font-bold text-xs uppercase hover:text-slate-900">Back</button>
                </div>
                
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 grid grid-cols-3 gap-6 mb-6 shrink-0">
                    <div class="col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Name</label>
                        <input id="q-input-title" type="text" placeholder="Specialist Assessment" class="w-full p-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-900 font-bold outline-none focus:ring-2 ring-blue-500/20">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Min</label>
                        <input id="q-input-time" type="number" value="30" class="w-full p-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-900 font-bold outline-none focus:ring-2 ring-blue-500/20">
                    </div>
                </div>

                <div id="designer-list" class="flex-grow overflow-y-auto space-y-6 mb-6 pr-2"></div>
                
                <div class="flex gap-4 shrink-0">
                    <button onclick="addTaskUI()" class="flex-grow py-4 border-2 border-dashed border-slate-300 rounded-2xl font-bold text-slate-500 hover:text-blue-500 hover:border-blue-500 transition-all uppercase text-xs">+ Add Challenge</button>
                    <button onclick="finalizeContest()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all">DEPLOY</button>
                </div>
            </div>
        </div>

        <!-- View: Player IDE -->
        <div id="view-player" class="view">
            <div class="workspace" id="main-workspace">
                <!-- Sidebar -->
                <div class="problem-sidebar" id="sidebar">
                    <div class="flex-grow">
                        <span id="p-count" class="text-[10px] font-black text-blue-500 uppercase bg-blue-50 px-2 py-1 rounded">Problem 1</span>
                        <h1 id="p-title" class="text-2xl font-black text-slate-900 mt-6 mb-6 leading-tight">...</h1>
                        <div id="p-desc" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap">...</div>
                    </div>
                    <div class="mt-8 pt-6 border-t border-slate-100 shrink-0">
                        <label class="text-[9px] font-black text-slate-400 uppercase block mb-2">Select Language</label>
                        <select id="p-lang" onchange="changeLang()" class="w-full p-3 border border-slate-200 rounded-xl text-sm font-bold bg-white outline-none">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python 3</option>
                            <option value="html">HTML5</option>
                        </select>
                    </div>
                </div>

                <!-- Horizontal Resizer Handle -->
                <div class="resizer-h" id="drag-handle-h"></div>

                <!-- Editor Area -->
                <div class="editor-section">
                    <div class="h-12 bg-[#111827] border-b border-[#1f2937] flex items-center justify-between px-6 shrink-0">
                        <div class="flex items-center gap-3">
                            <span id="active-lang-label" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Javascript</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="runCode(false)" class="btn-run">Dry Run</button>
                            <button onclick="resetTask()" class="text-[10px] font-bold text-slate-500 hover:text-white">Reset</button>
                        </div>
                    </div>

                    <textarea id="main-editor" spellcheck="false" class="custom-textarea"></textarea>

                    <!-- Console/Output Pane (Resizable) -->
                    <div class="bottom-drawer" id="bottom-drawer">
                        <!-- Vertical Resizer Handle -->
                        <div class="resizer-v" id="drag-handle-v"></div>

                        <div class="h-10 bg-[#1f2937]/50 flex items-center justify-between shrink-0">
                            <div class="flex h-full">
                                <button onclick="setTab('terminal')" id="tab-terminal" class="tab-btn active">Terminal</button>
                                <button onclick="setTab('output')" id="tab-output" class="tab-btn">Output View</button>
                            </div>
                            <div id="exec-status" class="px-6"></div>
                        </div>
                        
                        <div id="terminal" class="terminal-content"></div>
                        <iframe id="html-preview-pane" class="w-full h-full border-none"></iframe>

                        <div class="h-20 bg-[#030712] border-t border-[#1f2937] flex items-center justify-between px-8 shrink-0">
                            <span id="runtime-status" class="text-[10px] text-slate-500 font-bold uppercase">Ready</span>
                            <button onclick="runCode(true)" class="btn-submit">SUBMIT CHALLENGE</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Shared Overlay Views -->
        <div id="view-lobby" class="view items-center justify-center bg-[#030712]">
            <div class="max-w-md w-full p-10 bg-white rounded-[2.5rem] shadow-2xl text-center">
                <h2 class="text-3xl font-black text-slate-900 mb-2">Contest Deployed</h2>
                <div id="share-string" class="p-4 bg-slate-50 border border-slate-100 rounded-2xl font-mono text-[9px] break-all text-left text-slate-400 h-24 overflow-y-auto mb-8 mt-4"></div>
                <button id="copy-btn" onclick="copyString()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-sm shadow-lg mb-4">COPY STRING</button>
                <button onclick="showView('landing')" class="w-full bg-slate-100 text-slate-600 py-4 rounded-xl font-bold text-sm">HOME</button>
            </div>
        </div>

        <div id="view-results" class="view items-center justify-center bg-[#030712]">
            <div class="text-center animate-enter">
                <p class="text-blue-500 font-black uppercase tracking-[0.4em] text-xs mb-4">Completed</p>
                <h1 class="text-9xl font-black text-white mb-10 tracking-tighter" id="final-ratio">0/0</h1>
                <button onclick="location.href=location.pathname" class="bg-white text-black px-12 py-4 rounded-full font-black uppercase text-sm">DONE</button>
            </div>
        </div>
    </main>

    <script>
        let contest = { title: '', time: 30, tasks: [] };
        let currentIdx = 0;
        let score = 0;
        let pyodide = null;
        let timer = null;
        let timeLeft = 0;

        const langTemplates = {
            javascript: `// Task: Computed logic\n// Result must be stored in 'result' variable\n\nconst a = 10;\nconst b = 5;\nconst result = a + b;\n\nconsole.log("Output:", result);`,
            python: `# Python 3 Mode\n# Result must be stored in 'result' variable\n\na = 10\nb = 5\nresult = a + b\n\nprint(f"Python Output: {result}")`,
            html: `<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }\n    h1 { font-size: 3rem; margin-bottom: 0.5rem; }\n    p { color: #94a3b8; }\n  </style>\n</head>\n<body>\n  <h1>Live Preview</h1>\n  <p>Your HTML renders here instantly.</p>\n</body>\n</html>`
        };

        // Resizable Sidebar Logic (Horizontal)
        const handleH = document.getElementById('drag-handle-h');
        const sidebar = document.getElementById('sidebar');
        let isDraggingH = false;

        handleH.addEventListener('mousedown', (e) => {
            isDraggingH = true;
            handleH.classList.add('is-dragging');
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        });

        // Resizable Bottom Drawer Logic (Vertical)
        const handleV = document.getElementById('drag-handle-v');
        const bottomDrawer = document.getElementById('bottom-drawer');
        let isDraggingV = false;

        handleV.addEventListener('mousedown', (e) => {
            isDraggingV = true;
            handleV.classList.add('is-dragging');
            document.body.style.cursor = 'row-resize';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (isDraggingH) {
                const newWidth = e.clientX;
                if (newWidth > 250 && newWidth < 700) {
                    sidebar.style.width = newWidth + 'px';
                }
            }
            if (isDraggingV) {
                const workspace = document.getElementById('main-workspace');
                const workspaceRect = workspace.getBoundingClientRect();
                const newHeight = workspaceRect.bottom - e.clientY;
                // Min height 100px, max height 85% of workspace
                if (newHeight > 100 && newHeight < (workspaceRect.height * 0.85)) {
                    bottomDrawer.style.height = newHeight + 'px';
                }
            }
        });

        document.addEventListener('mouseup', () => {
            isDraggingH = false;
            isDraggingV = false;
            handleH.classList.remove('is-dragging');
            handleV.classList.remove('is-dragging');
            document.body.style.cursor = 'default';
        });

        function setTab(type) {
            document.getElementById('tab-terminal').classList.remove('active');
            document.getElementById('tab-output').classList.remove('active');
            document.getElementById('terminal').style.display = 'none';
            document.getElementById('html-preview-pane').classList.remove('active');

            if (type === 'terminal') {
                document.getElementById('tab-terminal').classList.add('active');
                document.getElementById('terminal').style.display = 'block';
            } else {
                document.getElementById('tab-output').classList.add('active');
                document.getElementById('html-preview-pane').classList.add('active');
            }
        }

        async function initPython() {
            const status = document.getElementById('runtime-status');
            if (pyodide) return;
            status.innerText = 'LOADING PYTHON...';
            try {
                pyodide = await loadPyodide();
                status.innerText = 'PYTHON 3.11 READY';
            } catch (e) { status.innerText = 'PYTHON ERROR'; }
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(id === 'player') {
                document.getElementById('header-status').classList.remove('hidden');
                initPython();
            } else {
                document.getElementById('header-status').classList.add('hidden');
            }
        }

        function addTaskUI() {
            const id = contest.tasks.length;
            contest.tasks.push({ title: '', desc: '', judge: 'return result === 15' });
            const div = document.createElement('div');
            div.className = "p-6 bg-white border border-slate-200 rounded-3xl animate-enter shadow-sm";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Challenge #${id+1}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-red-500 font-bold text-[9px] hover:underline">REMOVE</button>
                </div>
                <div class="space-y-4">
                    <input type="text" placeholder="Challenge Title" oninput="contest.tasks[${id}].title=this.value" class="w-full p-3 bg-slate-100 border border-slate-200 rounded-xl font-bold text-slate-900 text-sm outline-none">
                    <textarea placeholder="Challenge Description" oninput="contest.tasks[${id}].desc=this.value" class="w-full p-4 bg-slate-100 border border-slate-200 rounded-xl text-slate-700 text-sm h-32 outline-none"></textarea>
                    <textarea oninput="contest.tasks[${id}].judge=this.value" class="w-full p-3 bg-[#030712] text-emerald-400 font-mono text-[11px] rounded-xl h-20 outline-none">return result === 15</textarea>
                </div>
            `;
            document.getElementById('designer-list').appendChild(div);
        }

        function finalizeContest() {
            contest.title = document.getElementById('q-input-title').value || "Assessment";
            contest.time = parseInt(document.getElementById('q-input-time').value) || 30;
            if(contest.tasks.length === 0) return;
            const data = btoa(unescape(encodeURIComponent(JSON.stringify(contest))));
            document.getElementById('share-string').innerText = data;
            showView('lobby');
        }

        function copyString() {
            const str = document.getElementById('share-string').innerText;
            const el = document.createElement('textarea');
            el.value = str;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            document.getElementById('copy-btn').innerText = "COPIED!";
            setTimeout(() => document.getElementById('copy-btn').innerText = "COPY STRING", 2000);
        }

        function handleManualJoin() {
            const str = document.getElementById('join-input').value.trim();
            if(!str) return;
            try {
                contest = JSON.parse(decodeURIComponent(escape(atob(str))));
                startContest();
            } catch(e) { alert("Invalid string."); }
        }

        function startContest() {
            currentIdx = 0; score = 0;
            timeLeft = contest.time * 60;
            loadTask();
            showView('player');
            setTab('terminal');
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft/60).toString().padStart(2,'0');
                const s = (timeLeft%60).toString().padStart(2,'0');
                document.getElementById('nav-timer').innerText = `${m}:${s}`;
                if(timeLeft <= 0) endContest();
            }, 1000);
        }

        function loadTask() {
            if (!contest.tasks[currentIdx]) return endContest();
            const t = contest.tasks[currentIdx];
            document.getElementById('p-count').innerText = `PROBLEM ${currentIdx+1} / ${contest.tasks.length}`;
            document.getElementById('p-title').innerText = t.title || "Untiled";
            document.getElementById('p-desc').innerText = t.desc || "Instructions...";
            changeLang();
        }

        function changeLang() {
            const lang = document.getElementById('p-lang').value;
            document.getElementById('active-lang-label').innerText = lang;
            document.getElementById('main-editor').value = langTemplates[lang] || "";
            document.getElementById('terminal').innerHTML = '<span class="text-slate-600">// Ready</span>';
        }

        async function runCode(submit = false) {
            const code = document.getElementById('main-editor').value;
            const lang = document.getElementById('p-lang').value;
            const term = document.getElementById('terminal');
            
            term.innerHTML = '<span class="text-blue-500">> Executing...</span>';
            let output = "";
            let evalResult = null;
            let error = null;

            try {
                if(lang === 'javascript') {
                    const originalLog = console.log;
                    console.log = (...args) => { output += args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ') + '\n'; term.innerText = output; };
                    const runner = new Function(code + `\nreturn (typeof result !== "undefined" ? result : null);`);
                    evalResult = runner();
                    console.log = originalLog;
                } 
                else if(lang === 'python') {
                    if (!pyodide) throw new Error("Loading Pyodide...");
                    pyodide.setStdout({ batched: (s) => { output += s + '\n'; term.innerText = output; } });
                    await pyodide.runPythonAsync(code);
                    evalResult = pyodide.globals.get('result');
                    if (evalResult && evalResult.toJs) evalResult = evalResult.toJs();
                }
                else if(lang === 'html') {
                    document.getElementById('html-preview-pane').srcdoc = code;
                    setTab('output');
                    output = "[HTML] Rendered successfully.";
                    evalResult = true; 
                }
            } catch(e) { error = e.message; }

            term.innerText = output || (error ? "" : "Done.");
            if(error) term.innerHTML += `<br><span class="text-red-500">Error: ${error}</span>`;

            if(submit && !error) {
                try {
                    const judge = new Function('result', contest.tasks[currentIdx].judge);
                    if(judge(evalResult)) {
                        score++;
                        term.innerHTML += `<br><br><span class="text-emerald-400 font-black">✓ PASSED</span>`;
                        setTimeout(() => { currentIdx++; loadTask(); }, 1200);
                    } else {
                        term.innerHTML += `<br><br><span class="text-amber-400 font-black">✗ FAILED</span>`;
                    }
                } catch(e) { term.innerHTML += `<br><span class="text-red-500">Judge Error</span>`; }
            }
        }

        function resetTask() { changeLang(); }

        function endContest() {
            clearInterval(timer);
            document.getElementById('final-ratio').innerText = `${score}/${contest.tasks.length}`;
            showView('results');
        }
    </script>
